<input type="text" 
       placeholder="Enter Product" 
       min="0" 
       step="1"
       style="
       padding:10px;

       border-radius:6px;
       border:none;
       width:200px;
">
<input type="number" 
       placeholder="Enter Price (₹)"

       padding:10px;

       border:none;
       width:200px;
">



    
<div>
    <button onclick="addProduct()" text-align=center>Add Product</button>

   
    <button onclick="addPrice()">Add Price</button>
    
</div>
<div id="productList" style="
margin-top:30px;
width:100%;
background: rgba(255,255,255,0.2);
border-radius:10px;
padding:10px;
color:white;
font-size:14px;
min-height:50px;

">
Products and Price :- 
<div>
    <p>Cricket Bat - ₹2500</p>
    <p>Cricket Kit - ₹7000</p>
    <p>Basket Ball - ₹1500</p>
    <p>Football - ₹1000</p>
</div>
</div>


<script>
function addProduct() {

    let product = document.querySelector("input[type='text']").value;
    let price = document.querySelector("input[type='number']").value;

    if(product === "" || price === ""){
        alert("Please enter both product and price");
        return;
    }

    let displayBox = document.getElementById("productList");

    let newItem = document.createElement("p");
    newItem.innerHTML = product + " - ₹" + price;

    displayBox.appendChild(newItem);

    // Clear inputs after adding
    document.querySelector("input[type='text']").value = "";
    document.querySelector("input[type='number']").value = "";
}
</script>
